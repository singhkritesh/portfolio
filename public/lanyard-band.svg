<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="100" viewBox="0 0 1200 100">
  <defs>
    <pattern id="h-stripes" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="3" fill="transparent"/>
      <rect y="3" width="1200" height="1" fill="rgba(255,255,255,0.045)"/>
    </pattern>
    <linearGradient id="top-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="rgba(0,0,0,0.5)"/>
      <stop offset="1"   stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="bottom-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="1"   stop-color="rgba(0,0,0,0.5)"/>
    </linearGradient>
    <filter id="deboss" x="-2%" y="-80%" width="104%" height="260%">
      <feDropShadow dx="0" dy="1"  stdDeviation="0.4" flood-color="rgba(0,0,0,0.9)"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="0"   flood-color="rgba(255,255,255,0.07)"/>
    </filter>
  </defs>

  <rect width="1200" height="100" fill="#111113"/>
  <rect width="1200" height="100" fill="url(#h-stripes)"/>
  <rect width="1200" height="22"        fill="url(#top-shadow)"/>
  <rect y="78" width="1200" height="22" fill="url(#bottom-shadow)"/>
  <rect width="1200" height="100" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>

  <g transform="translate(0,100) scale(1,-1)">
    <text
      x="215" y="50"
      font-family="'Courier New', Courier, monospace"
      font-size="29"
      font-weight="400"
      fill="#71717a"
      text-anchor="middle"
      dominant-baseline="central"
      letter-spacing="1"
      filter="url(#deboss)">KRITESH SINGH · PM</text>
  </g>
</svg>
